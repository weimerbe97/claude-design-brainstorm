<svg width="400" height="360" viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg">
<title>State 6 - Post-purchase confirmation</title>
<rect id="artboard-bg" width="400" height="360" fill="#FAFAF6"/>
<g id="notification-card">
<rect id="card-bg" x="40" y="20" width="320" height="320" rx="12" fill="#FFFFFF" stroke="#E5E4DF" stroke-width="0.5"/>
<g id="logo">
  <rect x="56" y="36" width="32" height="16" rx="2" fill="#E5E4DF"/>
  <text x="72" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#999999" letter-spacing="0.6">LOGO</text>
</g>
<text id="header-lifetime" x="344" y="50" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#5A5A55">$813.48 lifetime</text>
<text id="confirm-title" x="56" y="92" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#1A1A1A">Nice — here&#8217;s what you got</text>
<text x="56" y="130" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#1A1A1A">Code applied at checkout</text>
<text x="344" y="130" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#004977">&#8722;$18.20</text>
<line x1="56" y1="146" x2="344" y2="146" stroke="#E5E4DF" stroke-width="0.5"/>
<text x="56" y="166" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#1A1A1A">Rewards earned</text>
<text x="56" y="180" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#5A5A55">Up to 30% on eligible items · available in ~30 days</text>
<text x="344" y="172" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00875A">+$54.60</text>
<line x1="56" y1="202" x2="344" y2="202" stroke="#E5E4DF" stroke-width="0.5"/>
<text x="56" y="226" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#5A5A55">Saved on this order</text>
<text x="344" y="226" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#004977">Up to $72.80</text>
<g id="continue-cta">
  <rect x="56" y="258" width="288" height="40" rx="20" fill="#FFFFFF" stroke="#004977" stroke-width="0.5"/>
  <text x="200.0" y="283" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#004977">See all my savings</text>
</g>
</g>
</svg>