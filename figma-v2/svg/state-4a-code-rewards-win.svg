<svg width="400" height="380" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
<title>State 4a - Code plus rewards win</title>
<rect id="artboard-bg" width="400" height="380" fill="#FAFAF6"/>
<g id="notification-card">
<rect id="card-bg" x="40" y="20" width="320" height="340" rx="12" fill="#FFFFFF" stroke="#E5E4DF" stroke-width="0.5"/>
<g id="logo">
  <rect x="56" y="36" width="32" height="16" rx="2" fill="#E5E4DF"/>
  <text x="72" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#999999" letter-spacing="0.6">LOGO</text>
</g>
<g id="header-lifetime">
  <text x="294" y="50" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#9A958A" text-decoration="line-through">$792</text>
  <text x="344" y="50" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#5A5A55">$813.48 lifetime</text>
</g>
<g id="success-icon">
  <circle cx="74" cy="104" r="18" fill="#E0F2EB"/>
  <path d="M 67 104 L 72 109 L 82 99" stroke="#00875A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text id="success-title" x="106" y="100" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#1A1A1A">You&#8217;re all set</text>
<text id="success-detail" x="106" y="118" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#5A5A55">Two ways saved at Sephora</text>
<text x="56" y="160" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#1A1A1A">Code applied</text>
<text x="56" y="174" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A5A55">BROWSHADE</text>
<text x="344" y="166" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#004977">&#8722;$18.20</text>
<line x1="56" y1="190" x2="344" y2="190" stroke="#E5E4DF" stroke-width="0.5"/>
<text x="56" y="210" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#1A1A1A">Rewards activated</text>
<text x="56" y="224" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#5A5A55">Up to 30% on eligible items</text>
<text x="344" y="216" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#00875A">+$54.60</text>
<g id="exclusions-inline">
  <text x="56" y="264" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#9A958A">Excludes gift cards and orders deemed by Sephora</text>
  <text x="56" y="279" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#9A958A">to be for reseller activity.</text>
</g>
<g id="continue-cta">
  <rect x="56" y="308" width="288" height="40" rx="20" fill="#FFFFFF" stroke="#004977" stroke-width="0.5"/>
  <text x="200.0" y="333" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#004977">Continue to checkout</text>
</g>
</g>
</svg>