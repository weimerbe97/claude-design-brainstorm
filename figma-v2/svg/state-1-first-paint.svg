<svg width="400" height="320" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
<title>State 1 - First paint</title>
<rect id="artboard-bg" width="400" height="320" fill="#FAFAF6"/>
<g id="notification-card">
<rect id="card-bg" x="40" y="20" width="320" height="280" rx="12" fill="#FFFFFF" stroke="#E5E4DF" stroke-width="0.5"/>
<g id="logo">
  <rect x="56" y="36" width="32" height="16" rx="2" fill="#E5E4DF"/>
  <text x="72" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#999999" letter-spacing="0.6">LOGO</text>
</g>
<text id="dismiss-x" x="344" y="52" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#9A958A">×</text>
<text id="eyebrow" x="56" y="92" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#5A5A55">Earn rewards on this order</text>
<text id="hero-amount" x="56" y="124" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#004977">Up to 30% back</text>
<text id="hero-detail" x="56" y="148" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#5A5A55">on eligible items at Sephora</text>
<text id="exclusions" x="56" y="168" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#9A958A" text-decoration="underline">Exclusions apply</text>
<g id="primary-cta">
  <rect x="56" y="190" width="288" height="44" rx="22" fill="#004977"/>
  <text x="200.0" y="217" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">Activate rewards</text>
</g>
<g id="spinner-light">
  <circle cx="62" cy="260" r="5" fill="none" stroke="#E5E4DF" stroke-width="1.5"/>
  <path d="M 62 255 A 5 5 0 0 1 67 260" fill="none" stroke="#9A958A" stroke-width="1.5" stroke-linecap="round"/>
</g>
<text id="codes-loading" x="76" y="263" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#9A958A">Also checking for codes</text>
</g>
</svg>